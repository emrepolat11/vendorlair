<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — VendorLair</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --black: #09090C; --surface: #111118; --border: rgba(255,255,255,0.07);
    --purple: #6C63FF; --white: #F0EDE6; --muted: rgba(240,237,230,0.55); --dim: rgba(240,237,230,0.25);
  }
  html { scroll-behavior: smooth; }
  body { background: var(--black); color: var(--white); font-family: 'DM Sans', sans-serif; font-weight: 400; min-height: 100vh; -webkit-font-smoothing: antialiased; }

  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 0 48px; height: 64px; display: flex; align-items: center; justify-content: space-between; background: rgba(9,9,12,0.90); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
  .logo { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 700; color: var(--white); text-decoration: none; letter-spacing: 0.5px; }
  .nav-back { font-size: 13px; color: var(--dim); text-decoration: none; transition: color 0.2s; }
  .nav-back:hover { color: var(--white); }

  .container { max-width: 560px; margin: 0 auto; padding: 140px 48px 80px; }

  .page-label { font-size: 11px; color: var(--purple); letter-spacing: 0.12em; text-transform: uppercase; font-weight: 500; margin-bottom: 12px; }
  .page-title { font-family: 'Cormorant Garamond', serif; font-size: 44px; font-weight: 700; color: var(--white); line-height: 1.1; margin-bottom: 12px; }
  .page-sub { font-size: 15px; color: var(--muted); line-height: 1.7; margin-bottom: 40px; font-weight: 300; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 28px; }

  label { font-size: 10px; color: rgba(240,237,230,0.4); font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; display: block; }
  input, textarea {
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px; color: var(--white); padding: 13px 16px; font-size: 14px; width: 100%;
    outline: none; font-family: 'DM Sans', sans-serif; box-sizing: border-box; transition: border-color 0.15s; margin-bottom: 18px;
  }
  textarea { resize: vertical; min-height: 120px; line-height: 1.6; }
  input:focus, textarea:focus { border-color: rgba(108,99,255,0.5); box-shadow: 0 0 0 3px rgba(108,99,255,0.1); }

  .btn-send {
    background: var(--purple); border: none; color: #fff; padding: 14px; border-radius: 10px;
    font-size: 14px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; width: 100%;
    box-shadow: 0 4px 14px rgba(108,99,255,0.35); transition: opacity 0.2s;
  }
  .btn-send:hover { opacity: 0.85; }
  .btn-send:disabled { opacity: 0.5; cursor: default; }

  .status { padding: 12px 16px; border-radius: 10px; font-size: 13px; margin-bottom: 18px; display: none; }
  .status.success { background: rgba(47,158,68,0.10); border: 1px solid rgba(47,158,68,0.25); color: #69DB7C; display: block; }
  .status.error { background: rgba(250,82,82,0.10); border: 1px solid rgba(250,82,82,0.25); color: #FF6B6B; display: block; }

  .alt-contact { text-align: center; margin-top: 24px; font-size: 13px; color: var(--dim); }
  .alt-contact a { color: var(--purple); text-decoration: none; }

  footer { border-top: 1px solid var(--border); padding: 32px 48px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--dim); margin-top: 60px; }
  .footer-links { display: flex; gap: 24px; }
  .footer-links a { color: var(--dim); text-decoration: none; }
  .footer-links a:hover { color: var(--muted); }

  @media (max-width: 768px) {
    nav { padding: 0 20px; }
    .container { padding: 120px 20px 60px; }
    footer { flex-direction: column; gap: 16px; text-align: center; padding: 24px 20px; }
    .footer-links { justify-content: center; }
  }
</style>
</head>
<body>

<nav>
  <a href="/" class="logo">VendorLair</a>
  <a href="/" class="nav-back">← Back to home</a>
</nav>

<div class="container">
  <div class="page-label">Get in touch</div>
  <h1 class="page-title">Contact us</h1>
  <p class="page-sub">Questions, feedback, or need help? Send us a message and we'll get back to you as soon as we can.</p>

  <div class="card">
    <div class="status" id="status"></div>
    <div>
      <label for="name">Your name</label>
      <input type="text" id="name" placeholder="Jane Doe" />
    </div>
    <div>
      <label for="email">Your email</label>
      <input type="email" id="email" placeholder="jane@company.com" />
    </div>
    <div>
      <label for="message">Message</label>
      <textarea id="message" placeholder="How can we help?"></textarea>
    </div>
    <button class="btn-send" id="sendBtn" onclick="sendMessage()">Send message</button>
  </div>

  <div class="alt-contact">
    We typically respond within a day or two.
  </div>
</div>

<footer>
  <a href="/" style="font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:700;color:rgba(240,237,230,0.5);text-decoration:none;">VendorLair</a>
  <div class="footer-links">
    <a href="/privacy.html">Privacy</a>
    <a href="/terms.html">Terms</a>
    <a href="/contact.html">Contact</a>
  </div>
  <span>© 2026 VendorLair</span>
</footer>

<script>
  const FUNCTION_URL = "https://zbubciohzssmunwdbdch.supabase.co/functions/v1/contact-form";

  async function sendMessage() {
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const message = document.getElementById("message").value.trim();
    const status = document.getElementById("status");
    const btn = document.getElementById("sendBtn");

    status.className = "status";
    status.style.display = "none";

    if (!name || !email || !message) {
      status.className = "status error";
      status.textContent = "⚠️ Please fill in all fields.";
      return;
    }

    btn.disabled = true;
    btn.textContent = "Sending…";

    try {
      const res = await fetch(FUNCTION_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, email, message }),
      });

      if (!res.ok) throw new Error("Failed to send");

      status.className = "status success";
      status.textContent = "✅ Message sent! We'll be in touch soon.";
      document.getElementById("name").value = "";
      document.getElementById("email").value = "";
      document.getElementById("message").value = "";
    } catch (e) {
      status.className = "status error";
      status.textContent = "⚠️ Something went wrong. Please try again in a moment.";
    } finally {
      btn.disabled = false;
      btn.textContent = "Send message";
    }
  }
</script>

</body>
</html>
